<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Dash & Dodge - Game Sulit!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div id="score-board">Skor: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="overlay" class="overlay">
            <h1 id="game-title">CUBE DASH & DODGE</h1>
            <p id="game-message">Tekan **SPASI** atau **Klik Layar** untuk Melompat.</p>
            <button id="start-btn">MULAI GAME</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
